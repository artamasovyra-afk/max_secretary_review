services:
  backend:
    image: max_secretary_backend:${RELEASE_VERSION:-1.0.0}
    container_name: max_secretary_backend
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    expose:
      - "8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/api/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  worker:
    image: max_secretary_backend:${RELEASE_VERSION:-1.0.0}
    container_name: max_secretary_worker
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    command: python -m app.workers.jobs
    healthcheck:
      test: ["CMD", "python", "-m", "app.workers.jobs", "--healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  webapp:
    image: max_secretary_webapp:${RELEASE_VERSION:-1.0.0}
    container_name: max_secretary_webapp
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    expose:
      - "80"
    healthcheck:
      test: ["CMD-SHELL", "test -s /var/run/nginx.pid && kill -0 \"$(cat /var/run/nginx.pid)\" && nginx -t >/dev/null 2>&1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  postgres:
    image: postgres:16
    container_name: max_secretary_postgres
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7
    container_name: max_secretary_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  nginx:
    image: nginx:stable
    container_name: max_secretary_nginx
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      webapp:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "test -s /var/run/nginx.pid && kill -0 \"$(cat /var/run/nginx.pid)\" && nginx -t >/dev/null 2>&1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  postgres_data:
  redis_data:
